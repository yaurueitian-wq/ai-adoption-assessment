<style>
  :root{
    --primary: #3B82F6;

    --text: #1E293B;

  *{ font-family: 'Fira Sans', system-ui, sans-serif; }
  .mono{ font-family: 'Fira Code', monospace; }
  body{ background: var(--bg); color: var(--text); }
  ::selection{ background: var(--primary); color: white; }

  .opt{ transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease; }
  .opt:hover{ border-color: var(--primary); background: #EFF6FF; }
  .opt.selected{ border-color: var(--primary); background: #EFF6FF; box-shadow: 0 0 0 1px var(--primary); }
  .opt-level{ transition: background 150ms ease, color 150ms ease; }
  .opt.selected .opt-level{ background: var(--primary); color: white; }

  .progress-seg{ height:4px; background:#E2E8F0; border-radius:9999px; flex:1; overflow:hidden; }
  .progress-seg.done{ background: var(--primary); }
  .progress-seg.current{ background: var(--secondary); position:relative; }
  .progress-seg.current::after{
    content:""; position:absolute; inset:0; background:var(--primary);
    animation: pulse 1.3s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.35} 50%{opacity:1} }

  .btn-primary{ background: var(--primary); transition: background 150ms ease, transform 150ms ease; }
  .btn-primary:hover{ background: #2563EB; }
  .btn-primary:active{ transform: scale(0.98); }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }

  .bar-track{ height:10px; background:#E2E8F0; border-radius:9999px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:9999px; transition:width 800ms cubic-bezier(.2,.8,.2,1); }

  .card{ background:white; border:1px solid #E2E8F0; border-radius:1rem; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>

/* ============ NEXT-STEP SYNTHESIS ============
   不機械式地只抓最低分構面，而是先綜合判讀5個分數的整體形狀，
   歸納出可能的組織樣貌（archetype），再從這個綜合診斷延伸出2-3個建議。 */
function nameOf(id){ return DIMENSIONS.find(d=>d.id===id).name; }

function classifyProfile(dimScores){
  const ids = DIMENSIONS.map(d=>d.id);
  const scores = ids.map(id=>dimScores[id]);
  const mean = scores.reduce((a,b)=>a+b,0)/scores.length;
  const spread = Math.max(...scores) - Math.min(...scores);
  const sorted = ids.slice().sort((a,b)=>dimScores[a]-dimScores[b]);
  const lowest = sorted[0], secondLowest = sorted[1], highest = sorted[sorted.length-1];

  let maxOpId = OPERATIONAL_DIMS[0];
  OPERATIONAL_DIMS.forEach(id => { if(dimScores[id] > dimScores[maxOpId]) maxOpId = id; });
  let minRcId = RISK_CONTROL_DIMS[0];
  RISK_CONTROL_DIMS.forEach(id => { if(dimScores[id] < dimScores[minRcId]) minRcId = id; });
  const opGap = dimScores[maxOpId] - dimScores[minRcId];

  // 1. 整體都低：還沒真正站穩腳步
  if(mean < 1.2){
    return {
      archetype: "起步觀望型",
      narrative: `五個構面的分數普遍偏低（平均 ${mean.toFixed(1)} 分），代表AI目前還沒有真正在組織內站穩腳步。這通常不是能力或意願的問題，而是還沒有一個具體的起點讓大家看到成效。`,
      actions: [
        `從單一低風險、重複性高的工作流程開始試點，先建立一個看得到成效的案例，而不是同時想解決所有構面。`,
        `在啟動任何規模化嘗試前，先建立最基本的資料使用規範與預算上限——這是投入成本最低、卻能防止最大風險的第一步。`,
        `指定一位技術背景的人參與AI工具的核准與導入決策，優先加速「${nameOf(lowest)}」這個目前最落後的構面。`
      ]
    };
  }

  // 2. 操作性構面明顯超前風控性構面：衝太快
  if(opGap >= GAP_THRESHOLD){
    return {
      archetype: "衝刺冒進型",
      narrative: `如同上方落差警示所述，你們在「${nameOf(maxOpId)}」等操作性構面已經跑得不慢，但「${nameOf(minRcId)}」明顯跟不上——這代表接下來的優先順序，不是繼續往前衝，而是先把落後的防線補齊。`,
      actions: [
        `在繼續擴大「${nameOf(maxOpId)}」的規模之前，先把「${nameOf(minRcId)}」補到接近其他構面的水準（可參考上方各構面診斷中的具體行動）。`,
        `為現有已在運行的並行/自動化工作，回溯性地補上最基本的治理防線（如資料使用規範、預算上限），而非只在啟動新工作時才要求。`,
        `建立一份簡單的「信任與治理邊界」對照表，讓已經跑得快的操作性工作有明確依循，避免落差持續擴大。`
      ]
    };
  }

  // 3. 只有存取單獨落後，其他構面都相對成熟：制度已備妥，但開放範圍很窄
  const othersMean = ids.filter(id=>id!=="access").reduce((a,id)=>a+dimScores[id],0) / 4;
  if(lowest === "access" && othersMean - dimScores.access >= 1.0 && othersMean >= 2.5){
    return {
      archetype: "少數特許型",
      narrative: `「治理／信任／審查」這些制度性的構面都已經相對成熟（平均約 ${othersMean.toFixed(1)} 分），但「存取」明顯是唯一落後的一塊——這代表組織不是不會用AI，而是把使用範圍刻意或被迫收得很窄。這通常來自三種不太一樣的原因，可以自行判斷哪個最接近實況：可能是目前只有少數具備高層信任或特定職位的人被允許使用（菁英特許）；也可能是IT基礎建設還撐不起更大範圍的部署（基礎建設缺口）；或者是預算/token額度有限，只能先給部分角色（成本限制）。`,
      actions: [
        `如果是「菁英特許」：把目前依賴個人信任的非正式開放，轉成一套可複製、可申請的制度化擴大流程，避免永遠卡在少數人手上。`,
        `如果是「IT基礎建設缺口」：優先盤點部署管道與系統整合的技術債，這是需要投資時間解決的問題，而非單純調整政策就能解決。`,
        `如果是「預算/token限制」：採取分級策略——把低風險、高頻率的工作交給較便宜的方案先行開放，把預算留給真正高價值的場景。`
      ]
    };
  }

  // 4. 落差小、整體偏高：均衡且成熟
  if(spread <= 1.0 && mean >= 3){
    return {
      archetype: "均衡成熟型",
      narrative: `五個構面發展得相當均衡，且整體水準已經不低（平均 ${mean.toFixed(1)} 分）——你們不是卡在單一明顯短板，而是整體正穩定地往下一階段推進。`,
      actions: [
        `優先補強「${nameOf(lowest)}」，這是目前唯一還沒完全跟上其他構面的部分，補齊後有機會讓整體評級直接跳一階（記得整體評級是取最低分）。`,
        `把目前運作良好的做法（尤其是「${nameOf(highest)}」）文件化，確保不依賴特定個人也能持續運作、順利傳承。`,
        `可以考慮啟動下一階段的規模化試點，但務必維持現有治理／信任的把關強度同步擴大，避免出現落差警示中提到的風險型態。`
      ]
    };
  }

  // 4. 落差小、整體偏中低：同步起步，但沒有示範案例
  if(spread <= 1.0){
    return {
      archetype: "同步起步型",
      narrative: `五個構面的發展速度相當一致，沒有明顯落後的單一構面——但這也代表目前還沒有哪個地方特別突出，能成為組織內部的示範案例，帶動其他人跟進。`,
      actions: [
        `與其平均分攤心力在5個構面，建議刻意挑一個構面（例如「${nameOf(highest)}」）優先推進到下一階段，做出一個看得見的成功案例。`,
        `把這個示範案例的具體做法整理成可複製的內部指引，再推廣到其他構面，而不是同時鋪開所有戰線。`,
        `觀察其中一個構面推進後，是否會自然帶動其他構面（例如並行能力提升後，審查方式往往也要跟著升級）。`
      ]
    };
  }

  // 5. 預設：有明顯落後但不屬於上述特定型態
  const stage1 = Math.min(Math.floor(dimScores[lowest]), 3);
  const stage2 = Math.min(Math.floor(dimScores[secondLowest]), 3);
  const action1 = DIAGNOSIS[lowest].byStage[stage1][0].action;
  const action2 = DIAGNOSIS[secondLowest].byStage[stage2][0].action;
  return {
    archetype: "局部落後型",
    narrative: `五個構面中，「${nameOf(lowest)}」與「${nameOf(secondLowest)}」明顯落後其他構面，這通常代表組織的投入或關注力還沒有平均分配到這兩塊，而不是能力上做不到。`,
    actions: [
      `針對「${nameOf(lowest)}」：${action1}`,
      `針對「${nameOf(secondLowest)}」：${action2}`,
      `建議定期重新填寫這份盤點，觀察這兩個構面補強後，整體評級與構面落差是否隨之改善。`
    ]
  };
}

function computeScores(){
  const dimScores = {};
  DIMENSIONS.forEach(d => {
    const vals = d.questions.map((q,i) => answers[`${d.id}-${i}`]);
    dimScores[d.id] = vals.reduce((a,b)=>a+b,0) / vals.length;
  });
  const overall = Math.min(...Object.values(dimScores));
  return { dimScores, overall };
}

function gaugeColor(pct){
  // red -> yellow -> green gradient by percentage
  if(pct < 0.34) return '#EF4444';
  if(pct < 0.67) return '#F59E0B';
  return '#22C55E';
}

const OPERATIONAL_DIMS = ["access", "parallel", "review"];
const RISK_CONTROL_DIMS = ["trust", "governance"];
const GAP_THRESHOLD = 1.5;

function renderGapWarning(dimScores){
  const opNames = { access: "存取", parallel: "並行", review: "審查" };
  const rcNames = { trust: "信任", governance: "治理" };

  let maxOpId = OPERATIONAL_DIMS[0];
  OPERATIONAL_DIMS.forEach(id => { if(dimScores[id] > dimScores[maxOpId]) maxOpId = id; });
  let minRcId = RISK_CONTROL_DIMS[0];
  RISK_CONTROL_DIMS.forEach(id => { if(dimScores[id] < dimScores[minRcId]) minRcId = id; });

  const gap = dimScores[maxOpId] - dimScores[minRcId];
  if(gap < GAP_THRESHOLD) return '';

  return `
    <div class="card p-6 sm:p-8 mb-6 bg-red-50 border-red-200">
      <div class="flex items-start gap-3">
        <span class="mono text-[10px] font-bold text-white bg-red-600 px-2.5 py-1 rounded-full uppercase tracking-wider shrink-0 mt-0.5">落差警示</span>
        <div>
          <h3 class="text-base font-bold text-red-700 mb-2">規模化速度，可能超前於風控能力</h3>
          <p class="text-sm text-slate-700 leading-relaxed mb-3">
            你們的「${opNames[maxOpId]}」構面已達 <b class="mono">${dimScores[maxOpId].toFixed(1)}</b> 分，但「${rcNames[minRcId]}」構面只有 <b class="mono">${dimScores[minRcId].toFixed(1)}</b> 分——落差達 ${gap.toFixed(1)} 分。
            這不只是「治理構面比較弱」的問題，而是一種特定的風險組合：組織已經在<b>沒有足夠護欄的狀態下</b>擴大AI的使用規模與自主程度，暴露的風險敞口比「全面都低分」的組織更高。
          </p>
          <div class="mono text-xs text-slate-500 bg-white/60 border-l-2 border-red-300 rounded-r-lg px-3 py-2.5 mb-3 leading-relaxed">
            研究依據：McKinsey調查顯示，51%企業曾發生AI相關事故；高績效組織通常是在擴大自主權的同時，同步強化human-in-the-loop與集中監督機制，而非先衝規模再補治理。
          </div>
          <div class="text-sm text-slate-800 border-l-2 border-red-500 pl-4 leading-relaxed">
            <b class="text-red-700">優先建議：</b>在繼續擴大「${opNames[maxOpId]}」構面的規模之前，先把「${rcNames[minRcId]}」補到至少與其他構面相近的水準，避免規模與風控的落差持續擴大。
          </div>
        </div>
      </div>
    </div>`;
}

function renderGauge(value, color){
  const pct = value/4;
  const angle = -120 + pct*240;
  const R = 72, size = 200, cx = size/2, cy = size/2+8;
  function polar(cx,cy,r,deg){ const rad=(deg-90)*Math.PI/180; return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)]; }
  const [x1,y1] = polar(cx,cy,R,-120);
  const [x2,y2] = polar(cx,cy,R,120);
  const trackPath = `M ${x1} ${y1} A ${R} ${R} 0 1 1 ${x2} ${y2}`;
  const [fx,fy] = polar(cx,cy,R,angle);
  const fillPath = `M ${x1} ${y1} A ${R} ${R} 0 ${pct>0.5?1:0} 1 ${fx} ${fy}`;
  const [nx,ny] = polar(cx,cy,R-18,angle);
  const ticks = [0,1,2,3,4].map(i=>{
    const deg = -120+(i/4)*240;
    const [tx1,ty1]=polar(cx,cy,R+9,deg), [tx2,ty2]=polar(cx,cy,R+2,deg);
    return `<line x1="${tx1}" y1="${ty1}" x2="${tx2}" y2="${ty2}" stroke="#CBD5E1" stroke-width="2"/>`;
  }).join('');
  return `
  <svg width="${size}" height="${size-8}" viewBox="0 0 ${size} ${size-8}">
    <path d="${trackPath}" fill="none" stroke="#E2E8F0" stroke-width="12" stroke-linecap="round"/>
    <path d="${fillPath}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${color}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="7" fill="${color}"/>
    <text x="${cx}" y="${cy+R+34}" text-anchor="middle" class="mono" font-size="13" fill="#64748B">${value.toFixed(1)} / 4.0</text>
  </svg>`;
}

function renderRadar(dimScores, weakIds){
  const N = DIMENSIONS.length;
  const size = 320, cx = size/2, cy = size/2, R = 110;
  function polar(r, i){
    const deg = -90 + (360/N)*i;
    const rad = deg * Math.PI/180;
    return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)];
  }
  // grid rings at 1,2,3,4
  const rings = [1,2,3,4].map(level => {
    const r = R * (level/4);
    const pts = DIMENSIONS.map((_,i) => polar(r,i).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#E2E8F0" stroke-width="1"/>`;
  }).join('');
  // axis lines
  const axes = DIMENSIONS.map((_,i) => {
    const [x,y] = polar(R,i);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#E2E8F0" stroke-width="1"/>`;
  }).join('');
  // data polygon
  const dataPts = DIMENSIONS.map((d,i) => polar(R*(dimScores[d.id]/4), i));
  const dataPath = dataPts.map(p=>p.join(',')).join(' ');
  // labels + dots
  const labels = DIMENSIONS.map((d,i) => {
    const [lx,ly] = polar(R+34,i);
    const isWeak = weakIds.includes(d.id);
    const anchor = Math.abs(lx-cx) < 4 ? 'middle' : (lx > cx ? 'start' : 'end');
    return `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="12" font-family="Fira Sans, sans-serif" fill="${isWeak?'#EF4444':'#475569'}" font-weight="${isWeak?'700':'500'}">${d.short}</text>`;
  }).join('');
  const dots = DIMENSIONS.map((d,i) => {
    const [x,y] = polar(R*(dimScores[d.id]/4), i);
    const isWeak = weakIds.includes(d.id);
    return `<circle cx="${x}" cy="${y}" r="4" fill="${isWeak?'#EF4444':'#3B82F6'}"/>`;
  }).join('');

  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${rings}
    ${axes}
    <polygon points="${dataPath}" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="2"/>
    ${dots}
    ${labels}
  </svg>`;
}

function restart(){ answers = {}; currentQ = -1; render(); }
render();
</script>
